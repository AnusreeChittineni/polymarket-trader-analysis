<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Traders: Win rate vs Market type (Canvas + D3)</title>
    <style>
      :root {
  --bg: #0b1220;
  --panel: #0f172a;
  --text: #e5e7eb;
  --muted: #94a3b8;
  --border: #1f2a44;
  --control-bg: #111c33;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
  background: var(--panel);
      }
      header h2 {
        margin: 0;
        font-weight: 650;
        font-size: 18px;
      }
      header .sub {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }
      #controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: end;
        padding: 10px 18px;
        border-bottom: 1px solid var(--border);
  background: var(--panel);
      }
      .control {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      label {
        font-size: 12px;
        color: var(--muted);
      }
      select,
      input,
      button {
        padding: 7px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--control-bg);
        color: var(--text);
        font-size: 13px;
      }
      select:focus,
      input:focus,
      button:focus {
        outline: 2px solid rgba(59, 130, 246, 0.55);
        outline-offset: 1px;
      }
      button {
        cursor: pointer;
      }
      button:hover {
        background: #162447;
      }
      #status {
        color: var(--muted);
        font-size: 13px;
        padding-left: 8px;
        align-self: center;
      }
      #viz {
        position: relative;
  /* Make the plot smaller than the full viewport and center it */
  width: min(1100px, calc(100vw - 48px));
  height: min(700px, calc(100vh - 220px));
  margin: 18px auto;
  padding: 18px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: rgba(15, 23, 42, 0.55);
      }

      #main {
        width: 100%;
      }

      #layout {
        position: relative;
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: 4fr 1fr; /* legend ~ 1/5 */
        gap: 14px;
      }

      #plotCol {
        position: relative;
        width: 100%;
        height: 100%;
        min-width: 0;
      }

      #plotWrap {
        position: relative;
        width: 100%;
        height: 100%;
        min-width: 0;
        border: 1px solid rgba(31, 42, 68, 0.6);
        border-radius: 12px;
        background: rgba(11, 18, 32, 0.25);
      }


      canvas {
        position: absolute;
        inset: 0;
      }
      /*svg {
     position: absolute;
        inset: 0;
        pointer-events: none;
      }*/
      #axes {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

      #clusterInfoWrap {
        width: min(1100px, calc(100vw - 48px));
  /* Keep this panel clearly below the graph+legend card */
  margin: 18px auto 22px auto;
        padding: 14px 18px;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.55);
  clear: both;
      }

      #clusterInfoWrap h3 {
        margin: 0 0 8px 0;
        font-size: 14px;
        font-weight: 650;
      }

      #clusterInfoWrap .sub {
        margin: 0 0 10px 0;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.35;
      }

      #clusterInfo {
        width: 100%;
        height: 240px;
        display: block;
        border: 1px solid rgba(31, 42, 68, 0.6);
        border-radius: 12px;
        background: rgba(11, 18, 32, 0.25);
        pointer-events: none;
      }

      #clusterInfo text {
        fill: #cbd5e1;
        font-size: 12px;
      }

      #clusterInfo .sub {
        fill: #94a3b8;
        font-size: 11px;
      }

      #clusterInfo .sw {
        stroke: rgba(226, 232, 240, 0.35);
        stroke-width: 1;
      }
      /* Axis styling (D3 writes SVG elements, so we style them via CSS) */
      svg .domain {
        stroke: #334155;
      }
      svg .tick line {
        stroke: #1f2a44;
      }
      svg .tick text {
        fill: #cbd5e1;
      }
      .tooltip {
        position: absolute;
        pointer-events: none;
  background: rgba(248, 250, 252, 0.96);
  color: #0b1220;
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 12px;
        line-height: 1.3;
        max-width: 320px;
        transform: translate(10px, 10px);
        display: none;
  border: 1px solid rgba(148, 163, 184, 0.6);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      }
      .tooltip .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      .legend {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: auto;
  padding: 10px 12px;
  box-sizing: border-box;
  border: 1px solid rgba(31, 42, 68, 0.6);
  border-radius: 12px;
  background: rgba(15, 23, 42, 0.78);
  color: var(--text);
      }
      .legend h3 {
        margin: 0 0 8px 0;
        font-size: 13px;
        font-weight: 650;
      }
      .legend .sub {
        margin: 0 0 10px 0;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.35;
      }
      .legend .row {
  display: grid;
  grid-template-columns: 14px 1fr;
  gap: 10px;
  align-items: start;
  padding: 8px 0;
  margin: 0;
  border: none;
  border-radius: 0;
  background: transparent;
  border-top: 1px solid rgba(31, 42, 68, 0.9);
      }
      .legend .row:first-of-type {
  border-top: none;
      }
      .legend .swatch {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        margin-top: 3px;
        border: 1px solid rgba(226, 232, 240, 0.35);
      }
      .legend .title {
        font-size: 12px;
        font-weight: 650;
        margin: 0;
      }
      .legend .desc {
        margin: 2px 0 0 0;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <header>
      <h2>Prediction Market Exploratory Visualizations: Viewing Trader Archetypes</h2>

    </header>

    <div id="controls">
      <div class="control">
        <label for="xAxis">X axis</label>
        <select id="xAxis">
          <option value="tsne_1" selected>Default (tsne_1)</option>
          <option value="avg_odds">Avg Odds</option>
          <option value="avg_trade_size">Avg Trade Size</option>
          <option value="frequency">Frequency</option>
          <option value="net_gains">Net Gains/Losses</option>
          <option value="profit_per_trade">Profit Per Trade</option>
          <option value="total_trade_number">Total Trade Number</option>
          <option value="total_trade_volume">Total Trade Volume</option>
          <option value="win_rate">Win Rate</option>
        </select>
      </div>
      <div class="control">
        <label for="yAxis">Y axis</label>
        <select id="yAxis">
          <option value="tsne_2" selected>Default (tsne_2)</option>
          <option value="avg_odds">Avg Odds</option>
          <option value="avg_trade_size">Avg Trade Size</option>
          <option value="frequency">Frequency</option>
          <option value="net_gains">Net Gains/Losses</option>
          <option value="profit_per_trade">Profit Per Trade</option>
          <option value="total_trade_number">Total Trade Number</option>
          <option value="total_trade_volume">Total Trade Volume</option>
          <option value="win_rate">Win Rate</option>
        </select>
      </div>
      <div class="control">
  <label for="maxPoints">Max points (1,000–5,000)</label>
  <input id="maxPoints" type="number" min="1000" max="5000" step="100" value="5000" />
      </div>
      <div class="control">
  <label for="minPositions">Minimum number of trades</label>
  <input id="minPositions" type="number" min="1" max="500000" step="10" value="1" />
      </div>
      <div class="control">
        <label for="category">Category</label>
        <select id="category">
          <option value="">All</option>
        </select>
      </div>
      <div class="control">
        <label for="pointAlpha">Point transparency</label>
        <input id="pointAlpha" type="number" min="0.05" max="1" step="0.05" value="0.35" />
      </div>
      <div class="control">
        <label for="includeSales">Include Sales</label>
        <input id="includeSales" type="checkbox" />
      </div>
      <div class="control">
        <label for="clusterMethod">Cluster method</label>
        <select id="clusterMethod">
          <option value="kmeans" selected>KMeans</option>
          <option value="dbscan">DBSCAN</option>
        </select>
      </div>
      <div class="control">
        <button id="reload">Reload</button>
      </div>
      <div id="status"></div>
    </div>

    <main id="main">
      <div id="viz">
        <div id="layout">
          <div id="plotCol">
            <div id="plotWrap">
              <canvas id="plot"></canvas>
              <svg id="axes"></svg>
              <div class="tooltip" id="tooltip"></div>
            </div>
          </div>
          <div class="legend" id="legend" aria-label="Cluster legend"></div>
        </div>
      </div>

      <!-- Cluster descriptions are *outside* the graph component so they don't overlap the plot. -->
      <div id="clusterInfoWrap">
        <h3>KMeans cluster archetypes</h3>
        <p class="sub">These names are heuristic, based on per-cluster medians (win rate, trades per trader, avg trade size, odds tilt, profit per trade). Switch to KMeans to see them.</p>
        <svg id="clusterInfo" role="img" aria-label="Cluster archetype descriptions"></svg>
      </div>
    </main>

    <!-- D3 bundles (UMD) -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="./main.js"></script>
  </body>
</html>
